# Datasources provisionados para Sentinel360
# Valores fijos para Docker (mariadb = nombre del servicio en docker-compose).
# Para instalación nativa, edita url/user/database/password o usa env vars si tu Grafana los expande.

apiVersion: 1

datasources:
  - name: Sentinel360 MariaDB
    type: mysql
    uid: sentinel360-mariadb
    access: proxy
    url: mariadb:3306
    user: sentinel
    database: sentinel360_analytics
    jsonData:
      maxOpenConns: 10
      maxIdleConns: 2
    secureJsonData:
      password: sentinel_password
    isDefault: true
    editable: false
