version: "3.9"

services:
  mariadb:
    image: mariadb:10.11
    container_name: sentinel360-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: sentinel360_analytics
      MYSQL_USER: sentinel
      MYSQL_PASSWORD: sentinel_password
    ports:
      - "3306:3306"   # exponer 3306 en host para Hive/metastore y scripts (si no hay MySQL/MariaDB del host)
    volumes:
      - mariadb_data:/var/lib/mysql
      # Asegura usuario sentinel@'%' y BD (solo se ejecuta si el volumen está vacío)
      - ../docs/sql_entorno_visual/01_create_db_and_user.sql:/docker-entrypoint-initdb.d/01_create_db_and_user.sql:ro

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    image: sentinel360-superset:local
    container_name: sentinel360-superset
    restart: unless-stopped
    ports:
      - "8089:8088"   # 8089 en host (8088 suele usarlo YARN ResourceManager)
    environment:
      SUPERSET_ENV: production
      SUPERSET_LOAD_EXAMPLES: "no"
      # Requerido por la imagen reciente: sin esto el frontend no arranca
      SUPERSET_SECRET_KEY: "MRl4kMoGOTsk5PotKY4W7y9ZCiRiGOH9JvZCXSC7YfwHWhrm35Eic"
    depends_on:
      - mariadb

  grafana:
    image: grafana/grafana:latest
    container_name: sentinel360-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MARIA_DB_HOST: mariadb
      MARIA_DB_PORT: "3306"
      MARIA_DB_USER: sentinel
      MARIA_DB_PASSWORD: sentinel_password
      MARIA_DB_NAME: sentinel360_analytics
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ../grafana/dashboards:/var/lib/grafana/dashboards/sentinel360
    depends_on:
      - mariadb

  tools:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tools
    container_name: sentinel360-tools
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "192.168.99.10:9092"
      MONGO_URI: "mongodb://192.168.99.10:27017"
    # Puedes usar este contenedor para ejecutar scripts como:
    # docker compose run --rm tools python scripts/gps_simulator.py

volumes:
  mariadb_data:
  grafana_data:

