# Spark 3.5.x - Clúster (NameNode/ResourceManager en 192.168.99.10)
spark.master                            yarn
spark.submit.deployMode                 client
spark.driver.memory                     2g
spark.executor.memory                   2g
spark.executor.cores                    2
spark.sql.warehouse.dir                 /user/hive/warehouse
spark.hadoop.fs.defaultFS               hdfs://192.168.99.10:9000
spark.hadoop.yarn.resourcemanager.hostname   192.168.99.10
spark.sql.catalogImplementation        hive

# History Server: directorio de eventos (crear con: mkdir -p /tmp/spark-events)
spark.eventLog.enabled                  true
spark.eventLog.dir                      file:/tmp/spark-events
spark.history.fs.logDirectory           file:/tmp/spark-events

